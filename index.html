<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hazel Pharmacy — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-card__logo">
      <svg width="48" height="48" viewBox="0 0 36 36" fill="none" style="border-radius:10px;flex-shrink:0;"><rect width="36" height="36" rx="8" fill="#2563eb"/><path d="M14 8h8v6h6v8h-6v6h-8v-6H8v-8h6V8z" fill="white"/></svg>
      <div>
        <h1 class="login-card__brand">Hazel</h1>
        <p class="login-card__sub">Pharmacy Management System</p>
      </div>
    </div>

    <form id="login-form" class="login-card__form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <input class="form-control" type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-icon-wrap">
          <input class="form-control" type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
          <button type="button" class="input-icon-btn" id="toggle-pw" aria-label="Toggle password">
            <svg id="eye-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <p id="login-error" class="login-card__error" hidden></p>

      <div style="text-align:right;margin-top:-4px;margin-bottom:8px">
        <button type="button" class="btn btn--ghost btn--sm" id="forgot-pw-btn" style="font-size:0.8rem;padding:2px 6px">Forgot password?</button>
      </div>
      <button type="submit" class="btn btn--primary btn--full" id="login-btn">
        <span id="btn-text">Sign In</span>
        <span id="btn-spinner" class="btn-spinner" hidden></span>
      </button>
    </form>

    <p class="login-card__footer">Hazel Pharmacy &copy; 2025 &middot; Authorized Personnel Only</p>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script type="module">
    import { auth } from '/js/firebase-config.js';
    import { signInWithEmailAndPassword, onAuthStateChanged, sendPasswordResetEmail } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
    import { getUserRole } from '/js/main.js';

    onAuthStateChanged(auth, async user => {
      if (user) await redirect(user);
    });

    async function redirect(user) {
      const role = await getUserRole(user);
      window.location.href = role === 'admin' ? '/admin/index.html' : '/pos.html';
    }

    const form     = document.getElementById('login-form');
    const emailEl  = document.getElementById('email');
    const pwEl     = document.getElementById('password');
    const errorEl  = document.getElementById('login-error');
    const btnText  = document.getElementById('btn-text');
    const spinner  = document.getElementById('btn-spinner');
    const togglePw = document.getElementById('toggle-pw');

    togglePw.addEventListener('click', () => {
      const show = pwEl.type === 'password';
      pwEl.type = show ? 'text' : 'password';
      togglePw.setAttribute('aria-label', show ? 'Hide password' : 'Show password');
    });

    document.getElementById('forgot-pw-btn').addEventListener('click', async () => {
      const email = emailEl.value.trim();
      if (!email) { errorEl.textContent = 'Enter your email address first.'; errorEl.hidden = false; return; }
      try {
        await sendPasswordResetEmail(auth, email);
        errorEl.style.color = '#16a34a';
        errorEl.textContent = 'Password reset email sent! Check your inbox.';
        errorEl.hidden = false;
      } catch (err) {
        errorEl.style.color = '';
        errorEl.textContent = 'Could not send reset email. Check the address and try again.';
        errorEl.hidden = false;
      }
    });

    form.addEventListener('submit', async e => {
      e.preventDefault();
      errorEl.hidden = true;
      btnText.textContent = 'Signing in…';
      spinner.hidden = false;
      form.querySelectorAll('input, button').forEach(el => el.disabled = true);

      try {
        const { user } = await signInWithEmailAndPassword(auth, emailEl.value.trim(), pwEl.value);
        redirect(user);
      } catch (err) {
        const msgs = {
          'auth/user-not-found':   'No account found with this email.',
          'auth/wrong-password':   'Incorrect password. Try again.',
          'auth/invalid-email':    'Please enter a valid email address.',
          'auth/too-many-requests':'Too many attempts. Try again later.',
          'auth/invalid-credential': 'Invalid email or password.',
        };
        errorEl.textContent = msgs[err.code] || 'Sign in failed. Please try again.';
        errorEl.hidden = false;
      } finally {
        btnText.textContent = 'Sign In';
        spinner.hidden = true;
        form.querySelectorAll('input, button').forEach(el => el.disabled = false);
      }
    });
  </script>
</body>
</html>
