<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K-take Rapha Pharmacy — POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebar-overlay"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar__logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" style="flex-shrink:0;border-radius:8px;"><rect width="36" height="36" rx="8" fill="#2563eb"/><path d="M14 8h8v6h6v8h-6v6h-8v-6H8v-8h6V8z" fill="white"/></svg>
    <span>K-take Rapha Pharmacy</span>
  </div>
  <nav class="sidebar__nav">
    <a href="/pos.html" class="sidebar__link sidebar__link--active">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      POS / Cashier
    </a>
    <!-- Admin-only links — shown via JS when user is admin -->
    <div id="admin-nav" hidden>
      <div class="sidebar__divider">Admin</div>
      <a href="/admin/index.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <a href="/admin/inventory.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
        Inventory
      </a>
    <a href="/admin/stock-movements.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Stock Log
    </a>
      
      <a href="/admin/customers.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Supplier
      </a>
      <a href="/admin/reports.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Reports
      </a>
      <a href="/admin/staff.html" class="sidebar__link">
        <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-1a9 9 0 0118 0v1"/></svg>
        Staff
      </a>
    </div>
  </nav>
  <div class="sidebar__bottom">
    <div class="sidebar__user" id="sidebar-user">
      <div class="sidebar__avatar" id="sidebar-avatar">C</div>
      <div>
        <p class="sidebar__uname" id="topbar-name">—</p>
        <p class="sidebar__urole" id="topbar-role">Cashier</p>
      </div>
    </div>
    <button class="sidebar__signout" id="sign-out-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main-content">
  <header class="topbar">
    <button class="topbar__menu" id="menu-toggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h2 class="topbar__title">Point of Sale</h2>
    <span class="topbar__date" id="topbar-date"></span>
  </header>

  <div class="pos-layout">
    <!-- LEFT: Product Search + Grid -->
    <div class="pos-left">
      <div class="pos-search-bar">
        <input class="form-control" type="text" id="product-search" placeholder="Search product by name…" />
        <div class="pos-category-tabs" id="category-tabs"></div>
      </div>
      <div class="pos-product-grid" id="product-grid">
        <div class="pos-empty">Loading products…</div>
      </div>
    </div>

    <!-- Cart overlay + FAB (mobile) -->
    <div class="pos-cart-overlay" id="cart-overlay"></div>
    <button class="pos-cart-fab" id="cart-fab" aria-label="View cart">
      <span class="pos-cart-fab__label">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.98-1.69l1.57-8.31H6"/></svg>
        View Cart <span class="pos-cart-fab__count" id="fab-count">0 items</span>
      </span>
      <span class="pos-cart-fab__total" id="fab-total">₱0.00</span>
    </button>

    <!-- RIGHT: Cart + Payment -->
    <div class="pos-right" id="cart-panel">
      <div class="pos-cart">
        <div class="pos-cart__handle"><div class="pos-cart__handle-bar"></div></div>
        <div class="pos-cart__header">
          <h3>Current Order</h3>
          <div style="display:flex;align-items:center;gap:8px;">
            <button class="btn btn--ghost btn--sm" id="clear-cart-btn">Clear</button>
            <button class="pos-cart__close-btn" id="close-cart-btn" aria-label="Close cart">✕</button>
          </div>
        </div>


        <div class="pos-cart__items" id="cart-items">
          <div class="pos-cart__empty">Cart is empty</div>
        </div>

        <div class="pos-cart__totals">
          <div class="pos-totals-row"><span>Subtotal</span><span id="subtotal">₱0.00</span></div>
          <div class="pos-totals-row">
            <span>Discount</span>
            <select id="discount-type" class="form-control form-control--sm" style="max-width:160px;font-size:0.8rem;padding:3px 6px;height:auto;">
              <option value="none">None</option>
              <option value="senior">Senior Citizen (20%)</option>
              <option value="pwd">PWD (20%)</option>
              <option value="employee">Employee (10%)</option>
            </select>
          </div>
          <div class="pos-totals-row" id="discount-row" hidden><span>Discount Amount</span><span id="discount-amount" style="color:#dc2626;">-₱0.00</span></div>
          <div class="pos-totals-row pos-totals-row--total"><span>TOTAL</span><span id="grand-total">₱0.00</span></div>
        </div>

        <div class="pos-payment">
          <label class="form-label">Amount Tendered</label>
          <input class="form-control form-control--lg" type="number" id="cash-tendered" placeholder="0.00" min="0" step="0.01" />
          <div class="pos-quick-cash" id="quick-cash"></div>
          <div class="pos-totals-row"><span>Change</span><span id="change-due" class="pos-change">₱0.00</span></div>
        </div>

        <button class="btn btn--primary btn--full btn--lg" id="checkout-btn" disabled>
          Process Payment
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Receipt Modal -->
<div class="modal" id="receipt-modal">
  <div class="modal__overlay" onclick="closeReceiptModal()"></div>
  <div class="modal__box modal__box--sm">
    <div class="receipt" id="receipt-content"></div>
    <div class="modal__footer">
      <button class="btn btn--outline" onclick="window.print()">Print Receipt</button>
      <button class="btn btn--primary" onclick="closeReceiptModal()">New Transaction</button>
    </div>
  </div>
</div>

<!-- Low Stock Alert Banner -->
<a class="low-stock-pill" id="low-stock-pill" href="/admin/inventory.html?filter=low" hidden title="View low stock items in Inventory">
  <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
  <span id="low-stock-pill-count"></span>
</a>

<div id="toast-container" class="toast-container"></div>

<script type="module">
  import { auth, db } from '/js/firebase-config.js';
  import { requireAuth, handleSignOut, showToast, formatPeso, formatDate, logActivity, populateTopbar, getUserRole } from '/js/main.js';
  import {
    collection, getDocs, addDoc, updateDoc, doc, query, where, orderBy, limit, serverTimestamp
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  let currentUser = null;
  let products = [];
  let cart = [];
  let filteredCategory = 'all';

  requireAuth(async user => {
    currentUser = user;
    const role = await getUserRole(user);
    populateTopbar(user, role);
    setAvatar(user);
    if (role === 'admin') document.getElementById('admin-nav').removeAttribute('hidden');

    await loadProducts();
    setTopbarDate();
    setupQuickCash();
    checkLowStock();
  });

  document.getElementById('sign-out-btn').addEventListener('click', handleSignOut);

  // Sidebar drawer (mobile)
  const sidebarEl = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  document.getElementById('menu-toggle').addEventListener('click', () => {
    const open = sidebarEl.classList.toggle('sidebar--open');
    sidebarOverlay.classList.toggle('sidebar-overlay--show', open);
  });
  sidebarOverlay.addEventListener('click', () => {
    sidebarEl.classList.remove('sidebar--open');
    sidebarOverlay.classList.remove('sidebar-overlay--show');
  });

  // Cart drawer (mobile)
  const cartPanel = document.getElementById('cart-panel');
  const cartOverlay = document.getElementById('cart-overlay');
  const cartFab = document.getElementById('cart-fab');

  function openCart() {
    cartPanel.classList.add('cart-open');
    cartOverlay.classList.add('pos-cart-overlay--show');
    // Block body pull-to-refresh while cart is open
    document.body.style.overscrollBehaviorY = 'contain';
  }
  function closeCart() {
    cartPanel.style.transform = '';
    cartPanel.classList.remove('cart-open', 'cart-dragging');
    cartOverlay.classList.remove('pos-cart-overlay--show');
    document.body.style.overscrollBehaviorY = '';
  }

  cartFab.addEventListener('click', openCart);
  cartOverlay.addEventListener('click', closeCart);
  document.getElementById('close-cart-btn').addEventListener('click', closeCart);
  // Close after checkout (receipt modal takes over)
  document.getElementById('checkout-btn').addEventListener('click', closeCart, { capture: false });

  // ── Swipe-to-dismiss the cart drawer ──────────────────────────────────────
  (function () {
    const handle = document.querySelector('.pos-cart__handle');
    let startY = 0, startTranslate = 0, dragging = false;
    const DISMISS_THRESHOLD = 130; // px to dismiss

    function getTranslate() {
      const t = new DOMMatrix(getComputedStyle(cartPanel).transform);
      return t.m42; // translateY value
    }

    handle.addEventListener('touchstart', e => {
      if (!cartPanel.classList.contains('cart-open')) return;
      startY = e.touches[0].clientY;
      startTranslate = 0;
      dragging = true;
      cartPanel.classList.add('cart-dragging');
    }, { passive: true });

    handle.addEventListener('touchmove', e => {
      if (!dragging) return;
      const dy = e.touches[0].clientY - startY;
      if (dy < 0) return; // don't allow dragging up beyond 0
      e.preventDefault(); // prevent pull-to-refresh
      cartPanel.style.transform = `translateY(${dy}px)`;
      // Fade overlay based on drag distance
      const progress = Math.min(dy / DISMISS_THRESHOLD, 1);
      cartOverlay.style.opacity = 1 - progress * 0.7;
    }, { passive: false });

    handle.addEventListener('touchend', e => {
      if (!dragging) return;
      dragging = false;
      const dy = e.changedTouches[0].clientY - startY;
      cartPanel.classList.remove('cart-dragging');
      cartOverlay.style.opacity = '';
      if (dy > DISMISS_THRESHOLD) {
        // Animate out then close
        cartPanel.style.transition = 'transform 0.25s ease';
        cartPanel.style.transform = `translateY(100%)`;
        setTimeout(closeCart, 260);
      } else {
        // Snap back
        cartPanel.style.transform = '';
      }
    }, { passive: true });
  })();

  // ── Load Products ──────────────────────────────────────────────────────────
  async function loadProducts() {
    const snap = await getDocs(collection(db, 'products'));
    products = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    buildCategoryTabs();
    renderProducts(document.getElementById('product-search').value);
  }


  function buildCategoryTabs() {
    const cats = ['all', ...new Set(products.map(p => p.category).filter(Boolean))];
    const tabs = document.getElementById('category-tabs');
    tabs.innerHTML = cats.map(c =>
      `<button class="pos-cat-tab ${c === 'all' ? 'pos-cat-tab--active' : ''}" data-cat="${c}">${c === 'all' ? 'All' : c}</button>`
    ).join('');
    tabs.querySelectorAll('.pos-cat-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        tabs.querySelectorAll('.pos-cat-tab').forEach(b => b.classList.remove('pos-cat-tab--active'));
        btn.classList.add('pos-cat-tab--active');
        filteredCategory = btn.dataset.cat;
        renderProducts();
      });
    });
  }

  function renderProducts(search = '') {
    const grid = document.getElementById('product-grid');
    let list = products.filter(p => p.stock > 0);
    if (filteredCategory !== 'all') list = list.filter(p => p.category === filteredCategory);
    if (search) {
      const q = search.toLowerCase();
      list = list.filter(p => p.name?.toLowerCase().includes(q));
    }
    if (!list.length) { grid.innerHTML = '<div class="pos-empty">No products found</div>'; return; }
    grid.innerHTML = list.map(p => {
      const cartItem = cart.find(x => x.id === p.id);
      const inCart = !!cartItem;
      const isLow = p.stock <= (p.lowStockThreshold || 10);
      return `
        <div class="pos-product-card ${inCart ? 'pos-product-card--in-cart' : ''}" data-id="${p.id}">
          <div class="pos-product-card__header">
            <div class="pos-product-card__name">${p.name}</div>
            ${inCart ? `<div class="pos-product-card__badge">${cartItem.qty}</div>` : ''}
          </div>
          <div class="pos-product-card__cat">${p.category || ''}</div>
          <div class="pos-product-card__footer">
            <div class="pos-product-card__price">${formatPeso(p.price)}</div>
            <div class="pos-product-card__stock ${isLow ? 'low' : ''}">${p.stock} left</div>
          </div>
        </div>`;
    }).join('');
    grid.querySelectorAll('.pos-product-card').forEach(card => {
      card.addEventListener('click', () => addToCart(card.dataset.id));
    });
  }

  // Update card states without re-rendering the whole grid
  function updateCardStates() {
    document.querySelectorAll('.pos-product-card[data-id]').forEach(card => {
      const cartItem = cart.find(x => x.id === card.dataset.id);
      const inCart = !!cartItem;
      card.classList.toggle('pos-product-card--in-cart', inCart);
      const header = card.querySelector('.pos-product-card__header');
      let badge = card.querySelector('.pos-product-card__badge');
      if (inCart) {
        if (!badge) {
          badge = document.createElement('div');
          badge.className = 'pos-product-card__badge';
          header.appendChild(badge);
        }
        badge.textContent = cartItem.qty;
      } else if (badge) {
        badge.remove();
      }
    });
  }

  document.getElementById('product-search').addEventListener('input', e => renderProducts(e.target.value));

  // ── Cart ───────────────────────────────────────────────────────────────────
  function addToCart(productId) {
    const p = products.find(x => x.id === productId);
    if (!p) return;
    const existing = cart.find(x => x.id === productId);
    if (existing) {
      if (existing.qty >= p.stock) { showToast(`Only ${p.stock} in stock`, 'warning'); return; }
      existing.qty++;
    } else {
      cart.push({ id: p.id, name: p.name, price: p.price, qty: 1, stock: p.stock, requiresPrescription: p.requiresPrescription });
    }
    renderCart();
    updateCardStates();
  }

  function renderCart() {
    const el = document.getElementById('cart-items');
    if (!cart.length) {
      el.innerHTML = `
        <div class="pos-cart__empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 001.98-1.69l1.57-8.31H6"/></svg>
          Tap a product to add it
        </div>`;
      updateTotals();
      return;
    }
    el.innerHTML = cart.map((item, i) => `
      <div class="pos-cart-item">
        <div class="pos-cart-item__name">
          ${item.name}${item.requiresPrescription ? ' <span class="badge badge--blue" style="font-size:0.6rem;padding:1px 6px;">Rx</span>' : ''}
        </div>
        <div class="pos-cart-item__subtotal">${formatPeso(item.price * item.qty)}</div>
        <div class="pos-cart-item__row2">
          <span class="pos-cart-item__unit">${formatPeso(item.price)} each</span>
          <button class="qty-btn qty-btn--remove" onclick="adjustQty(${i}, -1)" title="Decrease / Remove">−</button>
          <span class="qty-value">${item.qty}</span>
          <button class="qty-btn" onclick="adjustQty(${i}, 1)" title="Increase">+</button>
          <button class="remove-btn" onclick="removeItem(${i})" title="Remove item">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>
    `).join('');
    updateTotals();
  }

  window.adjustQty = (i, delta) => {
    const newQty = cart[i].qty + delta;
    if (newQty <= 0) {
      // Pressing − at qty 1 removes the item (unselects)
      cart.splice(i, 1);
      renderCart();
      updateCardStates();
      return;
    }
    if (newQty > cart[i].stock) { showToast(`Only ${cart[i].stock} in stock`, 'warning'); return; }
    cart[i].qty = newQty;
    renderCart();
    updateCardStates();
  };

  window.removeItem = i => {
    cart.splice(i, 1);
    renderCart();
    updateCardStates();
  };

  document.getElementById('clear-cart-btn').addEventListener('click', () => {
    cart = [];
    renderCart();
    updateCardStates();
  });

  // ── Totals ─────────────────────────────────────────────────────────────────
  function getDiscountRate() {
    const type = document.getElementById('discount-type')?.value || 'none';
    if (type === 'senior' || type === 'pwd') return 0.20;
    if (type === 'employee') return 0.10;
    return 0;
  }

  function updateTotals() {
    const subtotal = cart.reduce((sum, x) => sum + x.price * x.qty, 0);
    const rate = getDiscountRate();
    const discountAmt = subtotal * rate;
    const total = subtotal - discountAmt;

    document.getElementById('subtotal').textContent = formatPeso(subtotal);
    const discountRow = document.getElementById('discount-row');
    if (discountAmt > 0) {
      document.getElementById('discount-amount').textContent = `-${formatPeso(discountAmt)}`;
      discountRow.hidden = false;
    } else {
      discountRow.hidden = true;
    }
    document.getElementById('grand-total').textContent = formatPeso(total);

    const totalQty = cart.reduce((sum, x) => sum + x.qty, 0);
    document.getElementById('fab-count').textContent = totalQty === 1 ? '1 item' : `${totalQty} items`;
    document.getElementById('fab-total').textContent = formatPeso(total);

    updateChange(total);
    document.getElementById('checkout-btn').disabled = cart.length === 0 || total <= 0;
  }

  function updateChange(total) {
    const tendered = parseFloat(document.getElementById('cash-tendered').value) || 0;
    const change = tendered - total;
    const el = document.getElementById('change-due');
    el.textContent = formatPeso(Math.max(0, change));
    el.classList.toggle('pos-change--negative', change < 0);
  }

  document.getElementById('cash-tendered').addEventListener('input', () => {
    const total = parseFloat(document.getElementById('grand-total').textContent.replace(/[^0-9.]/g, '')) || 0;
    updateChange(total);
  });

  document.getElementById('discount-type').addEventListener('change', () => {
    updateTotals();
  });

  function setupQuickCash() {
    const amounts = [100, 200, 500, 1000];
    const el = document.getElementById('quick-cash');
    el.innerHTML = amounts.map(a => `<button class="btn btn--outline btn--sm pos-quick-btn" data-amt="${a}">₱${a}</button>`).join('');
    el.querySelectorAll('.pos-quick-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('cash-tendered').value = btn.dataset.amt;
        document.getElementById('cash-tendered').dispatchEvent(new Event('input'));
      });
    });
  }

  // ── Checkout ───────────────────────────────────────────────────────────────
  document.getElementById('checkout-btn').addEventListener('click', processPayment);

  async function processPayment() {
    const total = parseFloat(document.getElementById('grand-total').textContent.replace(/[^0-9.]/g, '')) || 0;
    const subtotal = parseFloat(document.getElementById('subtotal').textContent.replace(/[^0-9.]/g, '')) || 0;
    const tendered = parseFloat(document.getElementById('cash-tendered').value) || 0;
    if (tendered < total) { showToast('Insufficient cash tendered', 'error'); return; }

    const discountType = document.getElementById('discount-type').value;
    const discountAmount = subtotal - total;

    const btn = document.getElementById('checkout-btn');
    btn.disabled = true;
    btn.textContent = 'Processing…';

    try {
      const txData = {
        items: cart.map(x => ({ id: x.id, name: x.name, price: x.price, qty: x.qty })),
        subtotal, discountType, discountAmount, total,
        paymentMethod: 'cash',
        cashTendered: tendered,
        changeDue: Math.max(0, tendered - total),
        cashierId: currentUser.uid,
        cashierName: currentUser.displayName || currentUser.email,
        createdAt: serverTimestamp(),
        status: 'completed',
      };

      const txRef = await addDoc(collection(db, 'transactions'), txData);

      await Promise.all(cart.map(item =>
        updateDoc(doc(db, 'products', item.id), {
          stock: (products.find(p => p.id === item.id)?.stock || 0) - item.qty
        })
      ));

      await logActivity(currentUser, 'transaction_completed', { txId: txRef.id, total });

      showReceipt({ id: txRef.id, ...txData });
      cart = [];
      document.getElementById('discount-type').value = 'none';
      renderCart();
      await loadProducts();
    } catch (err) {
      console.error(err);
      showToast('Transaction failed: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Process Payment';
    }
  }

  // ── Receipt ────────────────────────────────────────────────────────────────
  function showReceipt(tx) {
    const el = document.getElementById('receipt-content');
    el.innerHTML = `
      <div class="receipt__header">
        <strong>K-take Rapha Pharmacy</strong>
        <p>Official Receipt</p>
        <small>${new Date().toLocaleString('en-PH')}</small>
      </div>
      <div class="receipt__id">Txn #${tx.id.slice(-8).toUpperCase()}</div>
      <table class="receipt__items">
        ${tx.items.map(i => `<tr><td>${i.name}</td><td>${i.qty}</td><td>${formatPeso(i.price * i.qty)}</td></tr>`).join('')}
      </table>
      <div class="receipt__divider"></div>
      <div class="receipt__row"><span>Subtotal</span><span>${formatPeso(tx.subtotal)}</span></div>
      ${tx.discountAmount > 0 ? `<div class="receipt__row"><span>Discount</span><span>-${formatPeso(tx.discountAmount)}</span></div>` : ''}
      <div class="receipt__row receipt__row--total"><span>TOTAL</span><span>${formatPeso(tx.total)}</span></div>
      <div class="receipt__row"><span>Cash</span><span>${formatPeso(tx.cashTendered)}</span></div>
      <div class="receipt__row"><span>Change</span><span>${formatPeso(tx.changeDue)}</span></div>
      <div class="receipt__footer">Thank you for your purchase!<br/>Cashier: ${tx.cashierName}</div>
    `;
    document.getElementById('receipt-modal').classList.add('modal--open');
    renderCart();
    document.getElementById('cash-tendered').value = '';
    updateTotals();
  }

  window.closeReceiptModal = () => {
    document.getElementById('receipt-modal').classList.remove('modal--open');
  };

  // ── Low Stock Alert ────────────────────────────────────────────────────────
  async function checkLowStock() {
    const lowItems = products.filter(p => p.stock <= (p.lowStockThreshold || 10) && p.stock > 0);
    if (!lowItems.length) return;
    document.getElementById('low-stock-pill-count').textContent = `${lowItems.length} low stock`;
    document.getElementById('low-stock-pill').hidden = false;
  }

  function setTopbarDate() {
    document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-PH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function setAvatar(user) {
    const a = document.getElementById('sidebar-avatar');
    if (a) a.textContent = (user.displayName?.[0] || user.email?.[0] || 'C').toUpperCase();
  }
</script>
</body>
</html>
