<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hazel Pharmacy — Customers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar__logo">
    <img src="/images/logo.jpg" width="36" height="36" style="border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.3);" />
    <span>Hazel Admin</span>
  </div>
  <nav class="sidebar__nav">
    <a href="/admin/index.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/pos.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      POS / Cashier
    </a>
    <a href="/admin/inventory.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Inventory
    </a>
    <a href="/admin/prescriptions.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Prescriptions
    </a>
    <a href="/admin/customers.html" class="sidebar__link sidebar__link--active">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Customers
    </a>
    <a href="/admin/reports.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </a>
    <a href="/admin/staff.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-1a9 9 0 0118 0v1"/></svg>
      Staff
    </a>
  </nav>
  <div class="sidebar__bottom">
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">A</div>
      <div>
        <p class="sidebar__uname" id="topbar-name">—</p>
        <p class="sidebar__urole" id="topbar-role">Administrator</p>
      </div>
    </div>
    <button class="sidebar__signout" id="sign-out-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main-content">
  <header class="topbar">
    <button class="topbar__menu" id="menu-toggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h2 class="topbar__title">Customers</h2>
    <button class="btn btn--primary" id="add-cust-btn">+ Add Customer</button>
  </header>

  <div class="page-body">
    <div class="card">
      <div class="card__header">
        <div class="search-filter-row">
          <input class="form-control" type="text" id="search-input" placeholder="Search by name, phone, or email…" />
          <select class="form-control" id="type-filter">
            <option value="">All Types</option>
            <option value="regular">Regular</option>
            <option value="senior">Senior / PWD</option>
            <option value="vip">VIP</option>
          </select>
        </div>
      </div>
      <div class="card__body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Type</th>
              <th>Address</th>
              <th>Date Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="cust-body"><tr><td colspan="7" class="text-center text-muted">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal" id="cust-modal">
  <div class="modal__overlay"></div>
  <div class="modal__box">
    <div class="modal__header">
      <h3 id="cust-modal-title">Add Customer</h3>
      <button class="modal__close" id="close-cust-modal">✕</button>
    </div>
    <form class="modal__body">
      <input type="hidden" id="cust-id" />
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input class="form-control" type="text" id="f-cname" required />
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-control" type="tel" id="f-phone" placeholder="+63 9XX XXX XXXX" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" type="email" id="f-email" />
        </div>
        <div class="form-group">
          <label class="form-label">Date of Birth</label>
          <input class="form-control" type="date" id="f-dob" />
        </div>
        <div class="form-group">
          <label class="form-label">Customer Type</label>
          <select class="form-control" id="f-ctype">
            <option value="regular">Regular</option>
            <option value="senior">Senior / PWD</option>
            <option value="vip">VIP</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Senior / PWD ID #</label>
          <input class="form-control" type="text" id="f-scid" placeholder="Required for Senior/PWD" />
        </div>
        <div class="form-group form-group--full">
          <label class="form-label">Address</label>
          <textarea class="form-control" id="f-addr" rows="2"></textarea>
        </div>
        <div class="form-group form-group--full">
          <label class="form-label">Notes / Allergies</label>
          <textarea class="form-control" id="f-cnotes" rows="2" placeholder="Known drug allergies, medical conditions…"></textarea>
        </div>
      </div>
    </form>
    <div class="modal__footer">
      <button class="btn btn--outline" id="cancel-cust-modal">Cancel</button>
      <button class="btn btn--primary" id="save-cust-btn">Save</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module">
  import { db } from '/js/firebase-config.js';
  import { requireAdmin, handleSignOut, showToast, formatDate, logActivity, populateTopbar } from '/js/main.js';
  import { collection, getDocs, addDoc, updateDoc, doc, serverTimestamp, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  let customers = [];
  let currentUser = null;

  requireAdmin(async user => {
    currentUser = user;
    populateTopbar(user);
    document.getElementById('sidebar-avatar').textContent = (user.displayName?.[0] || user.email[0]).toUpperCase();
    await loadCustomers();
  });

  document.getElementById('sign-out-btn').addEventListener('click', handleSignOut);
  document.getElementById('menu-toggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('sidebar--open'));

  async function loadCustomers() {
    const snap = await getDocs(query(collection(db, 'customers'), orderBy('name')));
    customers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const typeF = document.getElementById('type-filter').value;
    let list = customers.filter(c => {
      if (search && !c.name?.toLowerCase().includes(search) && !c.phone?.includes(search) && !c.email?.toLowerCase().includes(search)) return false;
      if (typeF && c.type !== typeF) return false;
      return true;
    });
    const typeColor = { regular:'badge--grey', senior:'badge--yellow', vip:'badge--purple' };
    const tbody = document.getElementById('cust-body');
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No customers found</td></tr>'; return; }
    tbody.innerHTML = list.map(c => `
      <tr>
        <td><strong>${c.name}</strong>${c.notes ? `<br/><small class="text-muted text-xs">⚠ ${c.notes.slice(0,40)}</small>` : ''}</td>
        <td>${c.phone || '—'}</td>
        <td>${c.email || '—'}</td>
        <td><span class="badge ${typeColor[c.type] || 'badge--grey'}">${c.type || 'regular'}</span></td>
        <td class="text-sm">${c.address || '—'}</td>
        <td class="text-sm text-muted">${formatDate(c.createdAt)}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn--ghost btn--sm" onclick="editCustomer('${c.id}')">Edit</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  ['search-input','type-filter'].forEach(id => document.getElementById(id).addEventListener('input', renderTable));

  document.getElementById('add-cust-btn').addEventListener('click', () => openModal());
  document.getElementById('close-cust-modal').addEventListener('click', closeModal);
  document.getElementById('cancel-cust-modal').addEventListener('click', closeModal);

  function openModal(c = null) {
    document.getElementById('cust-modal-title').textContent = c ? 'Edit Customer' : 'Add Customer';
    document.getElementById('cust-id').value = c?.id || '';
    document.getElementById('f-cname').value = c?.name || '';
    document.getElementById('f-phone').value = c?.phone || '';
    document.getElementById('f-email').value = c?.email || '';
    document.getElementById('f-dob').value = c?.dob || '';
    document.getElementById('f-ctype').value = c?.type || 'regular';
    document.getElementById('f-scid').value = c?.seniorId || '';
    document.getElementById('f-addr').value = c?.address || '';
    document.getElementById('f-cnotes').value = c?.notes || '';
    document.getElementById('cust-modal').classList.add('modal--open');
  }

  function closeModal() { document.getElementById('cust-modal').classList.remove('modal--open'); }

  window.editCustomer = id => { const c = customers.find(x => x.id === id); if (c) openModal(c); };

  document.getElementById('save-cust-btn').addEventListener('click', async () => {
    const id = document.getElementById('cust-id').value;
    const data = {
      name: document.getElementById('f-cname').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      dob: document.getElementById('f-dob').value || null,
      type: document.getElementById('f-ctype').value,
      seniorId: document.getElementById('f-scid').value.trim(),
      address: document.getElementById('f-addr').value.trim(),
      notes: document.getElementById('f-cnotes').value.trim(),
      updatedAt: serverTimestamp(),
    };
    if (!data.name) { showToast('Customer name is required', 'error'); return; }
    try {
      if (id) {
        await updateDoc(doc(db, 'customers', id), data);
        showToast('Customer updated');
      } else {
        data.createdAt = serverTimestamp();
        await addDoc(collection(db, 'customers'), data);
        showToast('Customer added');
      }
      closeModal();
      await loadCustomers();
    } catch (err) { showToast('Failed: ' + err.message, 'error'); }
  });
</script>
</body>
</html>
