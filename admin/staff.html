<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hazel Pharmacy — Staff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<aside class="sidebar" id="sidebar">
  <div class="sidebar__logo">
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none" style="flex-shrink:0;border-radius:8px;"><rect width="36" height="36" rx="8" fill="#2563eb"/><path d="M14 8h8v6h6v8h-6v6h-8v-6H8v-8h6V8z" fill="white"/></svg>
    <span>Hazel Pharmacy Admin</span>
  </div>
  <nav class="sidebar__nav">
    <a href="/admin/index.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/pos.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      POS / Cashier
    </a>
    <a href="/admin/inventory.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Inventory
    </a>
    <a href="/admin/prescriptions.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Prescriptions
    </a>
    <a href="/admin/customers.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Supplier
    </a>
    <a href="/admin/reports.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </a>
    <a href="/admin/staff.html" class="sidebar__link sidebar__link--active">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-1a9 9 0 0118 0v1"/></svg>
      Staff
    </a>
  </nav>
  <div class="sidebar__bottom">
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">A</div>
      <div>
        <p class="sidebar__uname" id="topbar-name">—</p>
        <p class="sidebar__urole" id="topbar-role">Administrator</p>
      </div>
    </div>
    <button class="sidebar__signout" id="sign-out-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main-content">
  <header class="topbar">
    <button class="topbar__menu" id="menu-toggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h2 class="topbar__title">Staff Management</h2>
    <button class="btn btn--primary" id="add-staff-btn">+ Add Staff</button>
  </header>

  <div class="page-body">
    <div class="card">
      <div class="card__header">
        <input class="form-control" type="text" id="search-input" placeholder="Search staff…" style="max-width:300px" />
      </div>
      <div class="card__body table-responsive">
        <table class="table">
          <thead>
            <tr><th>Name</th><th>Email</th><th>Role</th><th>Phone</th><th>Status</th><th>Date Added</th><th>Actions</th></tr>
          </thead>
          <tbody id="staff-body"><tr><td colspan="7" class="text-center text-muted">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal" id="staff-modal">
  <div class="modal__overlay"></div>
  <div class="modal__box modal__box--sm">
    <div class="modal__header">
      <h3 id="staff-modal-title">Add Staff</h3>
      <button class="modal__close" id="close-staff-modal">✕</button>
    </div>
    <form class="modal__body">
      <input type="hidden" id="staff-id" />
      <div class="form-group">
        <label class="form-label">Full Name *</label>
        <input class="form-control" type="text" id="f-sname" required />
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input class="form-control" type="email" id="f-semail" required />
      </div>
      <div class="form-group" id="pw-group">
        <label class="form-label">Password * <span style="font-weight:400;color:var(--text-3)">(min 6 characters)</span></label>
        <input class="form-control" type="password" id="f-spw" placeholder="Set login password" />
      </div>
      <div class="form-group">
        <label class="form-label">Role</label>
        <select class="form-control" id="f-srole">
          <option value="cashier">Cashier</option>
          <option value="pharmacist">Pharmacist</option>
          <option value="admin">Administrator</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-control" type="tel" id="f-sphone" />
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-control" id="f-sstatus">
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea class="form-control" id="f-snotes" rows="2"></textarea>
      </div>
    </form>
    <div class="modal__footer">
      <button class="btn btn--outline" id="cancel-staff-modal">Cancel</button>
      <button class="btn btn--primary" id="save-staff-btn">Save</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module">
  import { db } from '/js/firebase-config.js';
  import { requireAdmin, handleSignOut, showToast, formatDate, populateTopbar } from '/js/main.js';
  import { collection, getDocs, addDoc, updateDoc, doc, serverTimestamp, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, createUserWithEmailAndPassword, updateProfile, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

  // Secondary app — used to create auth accounts without signing the admin out
  const secondaryApp = initializeApp({
    apiKey: "AIzaSyB-FGDzEVf4ROxJZ33Bd40VK2s6H-cXr0Y",
    authDomain: "hazel-pharmacy-ph.firebaseapp.com",
    projectId: "hazel-pharmacy-ph",
    storageBucket: "hazel-pharmacy-ph.firebasestorage.app",
    messagingSenderId: "195661486512",
    appId: "1:195661486512:web:4365d70238382e93659e75"
  }, 'staff-creator');
  const secondaryAuth = getAuth(secondaryApp);

  let staffList = [];
  let currentUser = null;

  requireAdmin(async user => {
    currentUser = user;
    populateTopbar(user);
    document.getElementById('sidebar-avatar').textContent = (user.displayName?.[0] || user.email[0]).toUpperCase();
    await loadStaff();
  });

  document.getElementById('sign-out-btn').addEventListener('click', handleSignOut);
  const sidebarEl = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebar-overlay');
  document.getElementById('menu-toggle').addEventListener('click', () => {
    const open = sidebarEl.classList.toggle('sidebar--open');
    sidebarOverlay.classList.toggle('sidebar-overlay--show', open);
  });
  sidebarOverlay.addEventListener('click', () => {
    sidebarEl.classList.remove('sidebar--open');
    sidebarOverlay.classList.remove('sidebar-overlay--show');
  });

  async function loadStaff() {
    const snap = await getDocs(query(collection(db, 'staff'), orderBy('name')));
    staffList = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('search-input').value.toLowerCase();
    let list = staffList.filter(s => !search || s.name?.toLowerCase().includes(search) || s.email?.toLowerCase().includes(search));
    const roleColor = { admin:'badge--blue', cashier:'badge--green', pharmacist:'badge--purple' };
    const tbody = document.getElementById('staff-body');
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No staff found</td></tr>'; return; }
    tbody.innerHTML = list.map(s => `
      <tr>
        <td><strong>${s.name}</strong></td>
        <td>${s.email}</td>
        <td><span class="badge ${roleColor[s.role] || 'badge--grey'}">${s.role || 'cashier'}</span></td>
        <td>${s.phone || '—'}</td>
        <td><span class="badge ${s.status === 'active' ? 'badge--green' : 'badge--red'}">${s.status || 'active'}</span></td>
        <td class="text-sm text-muted">${formatDate(s.createdAt)}</td>
        <td>
          <div class="action-btns">
            <button class="btn btn--ghost btn--sm" onclick="editStaff('${s.id}')">Edit</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  document.getElementById('search-input').addEventListener('input', renderTable);
  document.getElementById('add-staff-btn').addEventListener('click', () => openModal());
  document.getElementById('close-staff-modal').addEventListener('click', closeModal);
  document.getElementById('cancel-staff-modal').addEventListener('click', closeModal);

  function openModal(s = null) {
    const isEdit = !!s;
    document.getElementById('staff-modal-title').textContent = isEdit ? 'Edit Staff' : 'Add Staff';
    document.getElementById('staff-id').value = s?.id || '';
    document.getElementById('f-sname').value = s?.name || '';
    document.getElementById('f-semail').value = s?.email || '';
    document.getElementById('f-semail').disabled = isEdit;
    document.getElementById('f-srole').value = s?.role || 'cashier';
    document.getElementById('f-sphone').value = s?.phone || '';
    document.getElementById('f-sstatus').value = s?.status || 'active';
    document.getElementById('f-snotes').value = s?.notes || '';
    document.getElementById('f-spw').value = '';
    document.getElementById('pw-group').style.display = isEdit ? 'none' : '';
    document.getElementById('staff-modal').classList.add('modal--open');
  }

  function closeModal() {
    document.getElementById('staff-modal').classList.remove('modal--open');
    document.getElementById('f-semail').disabled = false;
  }

  window.editStaff = id => { const s = staffList.find(x => x.id === id); if (s) openModal(s); };

  document.getElementById('save-staff-btn').addEventListener('click', async () => {
    const id = document.getElementById('staff-id').value;
    const name  = document.getElementById('f-sname').value.trim();
    const email = document.getElementById('f-semail').value.trim().toLowerCase();
    const pw    = document.getElementById('f-spw').value;
    const data  = {
      name,
      email,
      role:   document.getElementById('f-srole').value,
      phone:  document.getElementById('f-sphone').value.trim(),
      status: document.getElementById('f-sstatus').value,
      notes:  document.getElementById('f-snotes').value.trim(),
      updatedAt: serverTimestamp(),
    };

    if (!name || !email) { showToast('Name and email are required', 'error'); return; }

    const saveBtn = document.getElementById('save-staff-btn');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';

    try {
      if (id) {
        // Edit — update Firestore only
        await updateDoc(doc(db, 'staff', id), data);
        showToast('Staff updated');
      } else {
        // Add — create Firebase Auth account first, then save profile
        if (!pw || pw.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
        const cred = await createUserWithEmailAndPassword(secondaryAuth, email, pw);
        await updateProfile(cred.user, { displayName: name });
        await signOut(secondaryAuth);

        data.createdAt = serverTimestamp();
        data.addedBy   = currentUser.uid;
        data.uid       = cred.user.uid;
        await addDoc(collection(db, 'staff'), data);
        showToast('Staff account created and saved');
      }
      closeModal();
      await loadStaff();
    } catch (err) {
      const msgs = {
        'auth/email-already-in-use': 'That email already has a Firebase account.',
        'auth/invalid-email':        'Invalid email address.',
        'auth/weak-password':        'Password is too weak (min 6 characters).',
      };
      showToast(msgs[err.code] || err.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }
  });
</script>
</body>
</html>
