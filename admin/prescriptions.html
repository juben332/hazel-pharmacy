<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hazel Pharmacy — Prescriptions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sidebar__logo">
    <img src="/images/logo.jpg" width="36" height="36" style="border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.3);" />
    <span>Hazel Admin</span>
  </div>
  <nav class="sidebar__nav">
    <a href="/admin/index.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Dashboard
    </a>
    <a href="/pos.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      POS / Cashier
    </a>
    <a href="/admin/inventory.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
      Inventory
    </a>
    <a href="/admin/prescriptions.html" class="sidebar__link sidebar__link--active">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      Prescriptions
    </a>
    <a href="/admin/customers.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
      Customers
    </a>
    <a href="/admin/reports.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Reports
    </a>
    <a href="/admin/staff.html" class="sidebar__link">
      <svg class="sidebar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="5"/><path d="M3 21v-1a9 9 0 0118 0v1"/></svg>
      Staff
    </a>
  </nav>
  <div class="sidebar__bottom">
    <div class="sidebar__user">
      <div class="sidebar__avatar" id="sidebar-avatar">A</div>
      <div>
        <p class="sidebar__uname" id="topbar-name">—</p>
        <p class="sidebar__urole" id="topbar-role">Administrator</p>
      </div>
    </div>
    <button class="sidebar__signout" id="sign-out-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sign Out
    </button>
  </div>
</aside>

<div class="main-content">
  <header class="topbar">
    <button class="topbar__menu" id="menu-toggle">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <h2 class="topbar__title">Prescriptions</h2>
    <button class="btn btn--primary" id="add-rx-btn">+ Add Prescription</button>
  </header>

  <div class="page-body">
    <div class="card">
      <div class="card__header">
        <div class="search-filter-row">
          <input class="form-control" type="text" id="search-input" placeholder="Search by patient, doctor, or Rx #…" />
          <select class="form-control" id="status-filter">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="dispensed">Dispensed</option>
            <option value="partial">Partial</option>
            <option value="expired">Expired</option>
          </select>
        </div>
      </div>
      <div class="card__body table-responsive">
        <table class="table">
          <thead>
            <tr>
              <th>Rx #</th>
              <th>Patient</th>
              <th>Doctor</th>
              <th>Medications</th>
              <th>Date Issued</th>
              <th>Valid Until</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rx-body"><tr><td colspan="8" class="text-center text-muted">Loading…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Add/Edit Modal -->
<div class="modal" id="rx-modal">
  <div class="modal__overlay"></div>
  <div class="modal__box">
    <div class="modal__header">
      <h3 id="rx-modal-title">Add Prescription</h3>
      <button class="modal__close" id="close-rx-modal">✕</button>
    </div>
    <form class="modal__body">
      <input type="hidden" id="rx-id" />
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Prescription # *</label>
          <input class="form-control" type="text" id="f-rxnum" required placeholder="Rx-2025-001" />
        </div>
        <div class="form-group">
          <label class="form-label">Patient Name *</label>
          <input class="form-control" type="text" id="f-patient" required />
        </div>
        <div class="form-group">
          <label class="form-label">Doctor / Physician</label>
          <input class="form-control" type="text" id="f-doctor" />
        </div>
        <div class="form-group">
          <label class="form-label">Clinic / Hospital</label>
          <input class="form-control" type="text" id="f-clinic" />
        </div>
        <div class="form-group">
          <label class="form-label">Date Issued</label>
          <input class="form-control" type="date" id="f-issued" />
        </div>
        <div class="form-group">
          <label class="form-label">Valid Until</label>
          <input class="form-control" type="date" id="f-valid" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-control" id="f-status">
            <option value="pending">Pending</option>
            <option value="dispensed">Dispensed</option>
            <option value="partial">Partial</option>
            <option value="expired">Expired</option>
          </select>
        </div>
        <div class="form-group form-group--full">
          <label class="form-label">Medications (one per line)</label>
          <textarea class="form-control" id="f-meds" rows="4" placeholder="e.g. Amoxicillin 500mg - 21 tabs"></textarea>
        </div>
        <div class="form-group form-group--full">
          <label class="form-label">Notes</label>
          <textarea class="form-control" id="f-notes" rows="2"></textarea>
        </div>
      </div>
    </form>
    <div class="modal__footer">
      <button class="btn btn--outline" id="cancel-rx-modal">Cancel</button>
      <button class="btn btn--primary" id="save-rx-btn">Save</button>
    </div>
  </div>
</div>

<!-- View Modal -->
<div class="modal" id="view-rx-modal">
  <div class="modal__overlay"></div>
  <div class="modal__box modal__box--sm">
    <div class="modal__header">
      <h3>Prescription Detail</h3>
      <button class="modal__close" id="close-view-rx">✕</button>
    </div>
    <div class="modal__body" id="view-rx-content"></div>
    <div class="modal__footer">
      <button class="btn btn--outline" id="close-view-rx-btn">Close</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>

<script type="module">
  import { db } from '/js/firebase-config.js';
  import { requireAdmin, handleSignOut, showToast, formatDate, formatDateShort, logActivity, populateTopbar } from '/js/main.js';
  import { collection, getDocs, addDoc, updateDoc, doc, serverTimestamp, orderBy, query } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  let prescriptions = [];
  let currentUser = null;

  requireAdmin(async user => {
    currentUser = user;
    populateTopbar(user);
    document.getElementById('sidebar-avatar').textContent = (user.displayName?.[0] || user.email[0]).toUpperCase();
    await loadPrescriptions();
  });

  document.getElementById('sign-out-btn').addEventListener('click', handleSignOut);
  document.getElementById('menu-toggle').addEventListener('click', () => document.getElementById('sidebar').classList.toggle('sidebar--open'));

  async function loadPrescriptions() {
    const snap = await getDocs(query(collection(db, 'prescriptions'), orderBy('createdAt', 'desc')));
    prescriptions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderTable();
  }

  function renderTable() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const statusF = document.getElementById('status-filter').value;
    let list = prescriptions.filter(rx => {
      if (search && !rx.rxNumber?.toLowerCase().includes(search) && !rx.patientName?.toLowerCase().includes(search) && !rx.doctor?.toLowerCase().includes(search)) return false;
      if (statusF && rx.status !== statusF) return false;
      return true;
    });
    const statusColor = { pending:'badge--yellow', dispensed:'badge--green', partial:'badge--blue', expired:'badge--red' };
    const tbody = document.getElementById('rx-body');
    if (!list.length) { tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">No prescriptions found</td></tr>'; return; }
    tbody.innerHTML = list.map(rx => `
      <tr>
        <td><span class="font-mono text-sm">${rx.rxNumber || '—'}</span></td>
        <td><strong>${rx.patientName || '—'}</strong></td>
        <td>${rx.doctor || '—'}</td>
        <td class="text-sm text-muted">${(rx.medications || '').slice(0,50)}${(rx.medications||'').length > 50 ? '…' : ''}</td>
        <td class="text-sm">${rx.dateIssued || '—'}</td>
        <td class="text-sm">${rx.validUntil || '—'}</td>
        <td><span class="badge ${statusColor[rx.status] || 'badge--grey'}">${rx.status || 'pending'}</span></td>
        <td>
          <div class="action-btns">
            <button class="btn btn--ghost btn--sm" onclick="viewRx('${rx.id}')">View</button>
            <button class="btn btn--ghost btn--sm" onclick="editRx('${rx.id}')">Edit</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  ['search-input','status-filter'].forEach(id =>
    document.getElementById(id).addEventListener('input', renderTable)
  );

  // ── Add / Edit ─────────────────────────────────────────────────────────────
  document.getElementById('add-rx-btn').addEventListener('click', () => openRxModal());
  document.getElementById('close-rx-modal').addEventListener('click', closeRxModal);
  document.getElementById('cancel-rx-modal').addEventListener('click', closeRxModal);

  function openRxModal(rx = null) {
    document.getElementById('rx-modal-title').textContent = rx ? 'Edit Prescription' : 'Add Prescription';
    document.getElementById('rx-id').value = rx?.id || '';
    document.getElementById('f-rxnum').value = rx?.rxNumber || '';
    document.getElementById('f-patient').value = rx?.patientName || '';
    document.getElementById('f-doctor').value = rx?.doctor || '';
    document.getElementById('f-clinic').value = rx?.clinic || '';
    document.getElementById('f-issued').value = rx?.dateIssued || '';
    document.getElementById('f-valid').value = rx?.validUntil || '';
    document.getElementById('f-status').value = rx?.status || 'pending';
    document.getElementById('f-meds').value = rx?.medications || '';
    document.getElementById('f-notes').value = rx?.notes || '';
    document.getElementById('rx-modal').classList.add('modal--open');
  }

  function closeRxModal() { document.getElementById('rx-modal').classList.remove('modal--open'); }

  window.editRx = id => { const rx = prescriptions.find(x => x.id === id); if (rx) openRxModal(rx); };

  window.viewRx = id => {
    const rx = prescriptions.find(x => x.id === id);
    if (!rx) return;
    document.getElementById('view-rx-content').innerHTML = `
      <dl class="detail-list">
        <dt>Rx #</dt><dd>${rx.rxNumber || '—'}</dd>
        <dt>Patient</dt><dd>${rx.patientName || '—'}</dd>
        <dt>Doctor</dt><dd>${rx.doctor || '—'}</dd>
        <dt>Clinic</dt><dd>${rx.clinic || '—'}</dd>
        <dt>Date Issued</dt><dd>${rx.dateIssued || '—'}</dd>
        <dt>Valid Until</dt><dd>${rx.validUntil || '—'}</dd>
        <dt>Status</dt><dd>${rx.status}</dd>
        <dt>Medications</dt><dd><pre class="pre-wrap">${rx.medications || '—'}</pre></dd>
        <dt>Notes</dt><dd>${rx.notes || '—'}</dd>
        <dt>Recorded</dt><dd>${formatDate(rx.createdAt)}</dd>
      </dl>
    `;
    document.getElementById('view-rx-modal').classList.add('modal--open');
  };

  document.getElementById('close-view-rx').addEventListener('click', () => document.getElementById('view-rx-modal').classList.remove('modal--open'));
  document.getElementById('close-view-rx-btn').addEventListener('click', () => document.getElementById('view-rx-modal').classList.remove('modal--open'));

  document.getElementById('save-rx-btn').addEventListener('click', async () => {
    const id = document.getElementById('rx-id').value;
    const data = {
      rxNumber: document.getElementById('f-rxnum').value.trim(),
      patientName: document.getElementById('f-patient').value.trim(),
      doctor: document.getElementById('f-doctor').value.trim(),
      clinic: document.getElementById('f-clinic').value.trim(),
      dateIssued: document.getElementById('f-issued').value,
      validUntil: document.getElementById('f-valid').value,
      status: document.getElementById('f-status').value,
      medications: document.getElementById('f-meds').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      updatedAt: serverTimestamp(),
    };
    if (!data.rxNumber || !data.patientName) { showToast('Rx # and patient name are required', 'error'); return; }
    try {
      if (id) {
        await updateDoc(doc(db, 'prescriptions', id), data);
        showToast('Prescription updated');
      } else {
        data.createdAt = serverTimestamp();
        data.recordedBy = currentUser.uid;
        await addDoc(collection(db, 'prescriptions'), data);
        showToast('Prescription added');
      }
      closeRxModal();
      await loadPrescriptions();
    } catch (err) { showToast('Failed: ' + err.message, 'error'); }
  });
</script>
</body>
</html>
